services:
  - type: web
    name: workforce-sms-system
    runtime: python
    rootDir: SMS System
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SMS_GATEWAY_API_KEY
        sync: false
      - key: SMS_GATEWAY_WEBHOOK_KEY
        sync: false
      - key: SMS_GATEWAY_SEND_URL
        value: https://app.sms-gateway.app/services/send.php
      - key: SMS_GATEWAY_DEVICES
        sync: false
      - key: SMS_GATEWAY_TYPE
        value: sms
      - key: SMS_GATEWAY_PRIORITIZE
        value: "0"
      - key: DEFAULT_COUNTRY_CODE
        value: "+94"
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
